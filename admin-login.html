<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - School Result Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            margin: 0;
        }
        h2 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }
        #message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
        .school-title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="school-title">
            <h2>School Result Portal</h2>
            <p>Admin Login</p>
        </div>
        <div class="form-group">
            <input type="text" id="username" placeholder="Enter Username">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Enter Password">
        </div>
        <button onclick="login()">Login</button>
        <p id="message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
