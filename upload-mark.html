<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Marks - School Result Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="upload.css">
    <style>
        .dashboard-container {
            display: flex;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #222;
            padding-top: 20px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-bottom: 1px solid #444;
        }
        .sidebar a:hover {
            background: #0066cc;
        }
        .main-workspace {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header" style="background:#0066cc; color:white; padding:20px; display:flex; justify-content:space-between; align-items:center;">
        <h2>School Result Portal - Marks Management</h2>
        <button style="background:red; color:white; padding:10px 15px; border:none; border-radius:5px; cursor:pointer; width:auto;" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard-container">
        <div class="sidebar">
            <a href="admin-dashboard.html">Dashboard</a>
            <a href="upload-mark.html">Upload Marks</a>
            <a href="#">Manage Results</a>
            <a href="#">View Students</a>
            <a href="#">Settings</a>
        </div>

        <div class="main-workspace">
            <div class="upload-container" style="margin-top: 10px;">
                <h2>Upload Student Marks</h2>
                <form id="marksForm">
                    <div class="form-group">
                        <label for="name">Student Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="roll">Roll Number</label>
                        <input type="number" id="roll" required>
                    </div>
                    <div class="form-group">
                        <label for="math">Mathematics</label>
                        <input type="number" id="math" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="science">Science</label>
                        <input type="number" id="science" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="english">English</label>
                        <input type="number" id="english" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="computer">Computer</label>
                        <input type="number" id="computer" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="social">Social Studies</label>
                        <input type="number" id="social" min="0" max="100" required>
                    </div>
                    <button type="button" class="upload-btn" onclick="uploadMarks()">Upload Result</button>
                </form>
                <div id="resultBox"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
